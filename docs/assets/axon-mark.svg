  <g fill="none" stroke="#0b0f14" stroke-width="18" stroke-linecap="square" stroke-linejoin="miter">
    <path d="M72 230h108l38 42h54"/>
    <path d="M72 272h200"/>
    <path d="M72 314h108l38-42"/>
  </g>

  <g fill="#0b0f14">
    <rect x="48" y="218" width="24" height="24" rx="2"/>
    <rect x="48" y="260" width="24" height="24" rx="2"/>
    <rect x="48" y="302" width="24" height="24" rx="2"/>
    <circle cx="278" cy="272" r="30"/>
  </g>

  <circle cx="278" cy="272" r="42" fill="none" stroke="#ffffff" stroke-width="12"/>
</svg>
