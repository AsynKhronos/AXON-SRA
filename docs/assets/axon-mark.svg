     aria-labelledby="title desc">
  <title id="title">AXON-SRA project mark</title>
  <desc id="desc">A geometric A and X monogram with three semantic data paths converging on a central node.</desc>

  <circle cx="256" cy="256" r="238" fill="#ffffff" stroke="#0b0f14" stroke-width="12"/>

